name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --frozen
        working-directory: backend
      - name: Lint
        run: uv run ruff check app/ tests/
        working-directory: backend
      - name: Format check
        run: uv run ruff format --check app/ tests/
        working-directory: backend
      - name: Test with Coverage
        id: coverage
        continue-on-error: true
        env:
          POSTGRES_HOST: localhost
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
          SECRET_KEY: ci-test-secret-key-not-for-production
          SMTP_HOST: localhost
          SMTP_PORT: 587
          SMTP_USER: test@test.com
          SMTP_PASSWORD: test
          SMTP_FROM: test@test.com
          INFLUXDB_URL: http://localhost:8086
          INFLUXDB_TOKEN: test-token
          INFLUXDB_ORG: test
          INFLUXDB_BUCKET: test
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: test
          MINIO_SECRET_KEY: test
          REDIS_URL: redis://localhost:6379/0
        run: |
          uv run pytest -n auto --cov=app --cov-report=term-missing | tee coverage_report.txt
        working-directory: backend

      - name: Parse Coverage
        id: parse_coverage
        if: always()
        run: |
          if [ -f backend/coverage_report.txt ]; then
            TOTAL=$(grep "^TOTAL" backend/coverage_report.txt | grep -oE '[0-9]+%' | grep -oE '[0-9]+' || echo "")
            echo "TOTAL_COVERAGE=$TOTAL" >> $GITHUB_OUTPUT
            if [ -n "$TOTAL" ] && [ "$TOTAL" -lt 90 ]; then
              echo "is_low=true" >> $GITHUB_OUTPUT
            else
              echo "is_low=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "is_low=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Coverage Issue
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.parse_coverage.outputs.is_low == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOTAL: ${{ steps.parse_coverage.outputs.TOTAL_COVERAGE }}
        run: |
          echo "## Backend Coverage Report Summary" > issue_body.md
          echo "Current coverage: **${TOTAL}%** (Threshold: 90%)" >> issue_body.md
          echo "" >> issue_body.md
          echo '```' >> issue_body.md
          cat backend/coverage_report.txt >> issue_body.md
          echo '```' >> issue_body.md
          gh issue create --title "Low Coverage Alert: ${TOTAL}%" --body-file issue_body.md --label "bug,coverage"

      - name: Check Test Result
        if: always()
        run: |
          if [ "${{ steps.coverage.outcome }}" == "failure" ]; then
            echo "Tests failed. Failing the job."
            exit 1
          fi

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install pnpm
        run: npm i -g pnpm
      - name: Install dependencies
        run: pnpm install
        working-directory: frontend
      - name: Lint
        run: pnpm run lint
        working-directory: frontend
      - name: Format check
        run: pnpm run format:check
        working-directory: frontend
      - name: Test
        run: pnpm test
        working-directory: frontend
