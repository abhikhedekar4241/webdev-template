service: boilerplate-saas

image: your-username/boilerplate-saas

servers:
  web:
    - 1.2.3.4 # Replace with your VPS IP

registry:
  username: your-docker-username
  password:
    - DOCKER_REGISTRY_TOKEN

env:
  clear:
    POSTGRES_HOST: db
    POSTGRES_PORT: 5432
    REDIS_URL: redis://redis:6379/0
    FRONTEND_URL: https://your-domain.com
    BACKEND_URL: https://api.your-domain.com
  secret:
    - POSTGRES_USER
    - POSTGRES_PASSWORD
    - POSTGRES_DB
    - SECRET_KEY

# Accessories allow you to run managed dependencies alongside your app
accessories:
  db:
    image: postgres:16-alpine
    host: 1.2.3.4
    port: 5432
    env:
      clear:
        POSTGRES_DB: boilerplate
      secret:
        - POSTGRES_USER
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    host: 1.2.3.4
    port: 6379

proxy:
  ssl: true
  host: your-domain.com
  app_port: 3000

healthcheck:
  path: /health
  port: 8000
  interval: 10s
